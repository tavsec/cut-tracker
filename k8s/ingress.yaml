apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cut-tracker
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cut.example.com
      secretName: cut-tracker-tls
  rules:
    - host: cut.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cut-tracker
                port:
                  number: 80
